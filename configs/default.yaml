seed: 123
sample_rate_hz: 256

data:
  n_subjects: 30
  trials_per_subject: 8
  task: "sit_to_stand"
  duration_s: 2.7
  phase_durations_s: [0.5, 0.7, 1.0, 0.5]  # prep, momentum, extension, stabilization

signals:
  eeg:
    n_channels: 8
    mu_hz: 10.0
    beta_hz: 20.0
    erd_factor: 0.45          # amplitude multiplier during movement
    rebound_factor: 1.20      # amplitude multiplier during stabilization
    noise_std: 0.35
    artifact_prob: 0.02
  emg:
    muscles: ["quad", "ham", "glute", "ta", "gast", "erector"]
    base_noise_std: 0.10
    crosstalk: 0.10
    fatigue: false

augment:
  phase_duration_jitter_s: 0.08
  eeg_drift_strength: 0.18
  emg_drift_strength: 0.22
  channel_dropout_prob: 0.08
  corruption_strength: 0.10
  subject_gain_std: 0.18
  modality_latency_jitter_ms: 28.0
  torque_gain_std: 0.12
  torque_bias_std: 0.10
  train:
    phase_fusion:
      drop_eeg_prob: 0.12
      drop_emg_prob: 0.06
      eeg_noise_std: 0.020
      emg_noise_levels: [0.06, 0.12, 0.24]
      temporal_jitter_samples: 8
      channel_mask_prob: 0.10
      corruption_mix:
        emg_noise: 0.65
        drop_eeg: 0.20
        channel_mask: 0.10
        temporal_jitter: 0.05
        drop_emg: 0.00
      curriculum_warmup_epochs: 2
      curriculum_peak_epoch: 4
    torque_fusion:
      drop_eeg_prob: 0.25
      drop_emg_prob: 0.00
      eeg_noise_std: 0.012
      emg_noise_levels: [0.04, 0.08, 0.12]
      temporal_jitter_samples: 4
      channel_mask_prob: 0.04
      corruption_mix:
        emg_noise: 0.70
        drop_eeg: 0.25
        temporal_jitter: 0.05
        drop_emg: 0.00
      aux_corruption_prob: 0.35
    single_modality:
      noise_std: 0.020

digital_twin:
  anthropometry:
    thigh_m: [0.40, 0.06]   # mean, std
    shank_m: [0.43, 0.06]
    foot_m:  [0.26, 0.03]
    trunk_m: [0.55, 0.07]
  dynamics:
    knee_I: [0.25, 0.05]
    knee_b: [0.12, 0.03]
    knee_k: [6.0, 1.5]
  assistance:
    assist_ratio_mean: 0.35
    assist_ratio_std: 0.10
    max_exo_torque: 25.0

synergy:
  n_synergies: 3
  nmf_max_iter: 800

train:
  split_strategy: subject   # segment | trial | subject
  segment_len: 128
  segment_stride: 64
  batch_size: 128
  epochs_phase: 6
  epochs_torque: 8
  lr: 0.001
  weight_decay: 0.0001
  train_split: 0.75
  val_split: 0.10
  test_split: 0.15

model:
  phase:
    stem_hidden: 72
    latent_dim: 112
    head_hidden: 80
    pooling: attention
    dropout: 0.12
    loss_type: weighted_ce   # weighted_ce | focal
    focal_gamma: 2.0
    consistency_weight: 0.15
    smoothing_window: 1
    selection_clean_margin: 0.015
    selection_weights:
      clean: 0.60
      emg_noise: 0.25
      drop_eeg: 0.15
  torque:
    stem_hidden: 72
    latent_dim: 112
    head_hidden: 80
    pooling: attention
    dropout: 0.10
    regression_loss: huber   # mse | huber
    huber_delta: 1.0
    smoothness_weight: 0.10
    consistency_weight: 0.05
    selection_clean_margin_pct: 0.02
    magnitude_weight_alpha: 0.75
    magnitude_weight_gamma: 1.5
    range_weights:
      low: 1.00
      mid: 1.10
      high: 1.45
    selection_weights:
      clean: 0.55
      emg_noise: 0.20
      drop_eeg: 0.15
      high_target: 0.10

eval:
  phase_smoothing_window: 1
  stress:
    emg_noise: true
    modality_dropout: true
    temporal_shift: true
    noise_multipliers: [1.0, 1.5, 2.0, 3.0]
    modality_dropout_modes: ["drop_eeg", "drop_emg"]
    temporal_shift_samples: [-12, 12]

robustness:
  emg_noise_multipliers: [1.0, 1.5, 2.0, 3.0]
